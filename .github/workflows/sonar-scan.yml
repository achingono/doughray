name: Sonar Scan

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'code/**'
      - 'scripts/sonar/**'
      - 'sonar-project.properties'
      - 'docker-compose.yml'
      - '.github/workflows/sonar-scan.yml'
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - 'code/**'
      - 'scripts/sonar/**'
      - 'sonar-project.properties'
      - 'docker-compose.yml'
      - '.github/workflows/sonar-scan.yml'

permissions:
  contents: read

jobs:
  scan:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft != true

    services:
      sonarqube:
        image: sonarqube:community
        ports:
          - 9000:9000
        env:
          SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
        options: >-
          --health-cmd "curl -sf http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"'"
          --health-interval 15s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 120s

    env:
      SONAR_HOST_URL: http://localhost:9000
      SONAR_PROJECT_KEY: achingono_money
      SONAR_PROJECT_NAME: money

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Make Sonar scripts executable
        run: chmod +x scripts/sonar/*.sh

      - name: Run comprehensive SonarQube scan
        run: scripts/sonar/run-scan.sh

      - name: Summarize Sonar issues by rule
        run: scripts/sonar/summarize-issues.sh .sonar/issues.json .sonar

      - name: Create PRDs from discovered issue clusters
        run: scripts/sonar/generate-prds.sh .sonar/issues.json docs

      - name: Add Sonar summary
        if: always()
        run: |
          if [ ! -f .sonar/issues.json ]; then
            echo "## SonarQube Scan Summary" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "No issues file was produced." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          total=$(jq '.issues | length' .sonar/issues.json)
          blocker=$(jq '[.issues[] | select(.severity=="BLOCKER")] | length' .sonar/issues.json)
          critical=$(jq '[.issues[] | select(.severity=="CRITICAL")] | length' .sonar/issues.json)
          major=$(jq '[.issues[] | select(.severity=="MAJOR")] | length' .sonar/issues.json)
          minor=$(jq '[.issues[] | select(.severity=="MINOR")] | length' .sonar/issues.json)
          info=$(jq '[.issues[] | select(.severity=="INFO")] | length' .sonar/issues.json)

          echo "## SonarQube Scan Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Severity | Open Issues |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | ---: |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Total | $total |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Blocker | $blocker |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Critical | $critical |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Major | $major |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Minor | $minor |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Info | $info |" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Sonar results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonar-scan-results
          path: |
            .sonar/issues.json
            .sonar/issues.tsv
            .sonar/issues-top-sample.tsv
            .sonar/rule-counts.tsv
            .sonar/rule-counts-top20.tsv
            .sonar/top-rule-violations.txt
            docs/sonar-prds
          if-no-files-found: ignore
          retention-days: 14
