services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-finance}
      POSTGRES_USER: ${POSTGRES_USER:-finance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finance} -d ${POSTGRES_DB:-finance}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: code
      dockerfile: api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-finance}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-finance}
      NODE_ENV: ${NODE_ENV:-production}
      API_PORT: "3000"
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2024-06-01}
    command: >
      sh -c "npx prisma migrate deploy --schema=prisma/schema.prisma 2>/dev/null || npx prisma db push --schema=prisma/schema.prisma && node dist/index.js"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  spa:
    build:
      context: code
      dockerfile: spa/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${SPA_PORT:-80}:80"

  worker:
    build:
      context: code
      dockerfile: worker/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-finance}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-finance}
      NODE_ENV: ${NODE_ENV:-production}
      SIMPLEFIN_ACCESS_URL: ${SIMPLEFIN_ACCESS_URL:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2024-06-01}
    volumes:
      - ./.config/simplefin-cli:/root/.simplefin-cli

  sonarqube:
    image: sonarqube:community
    restart: unless-stopped
    profiles: ["sonar"]
    ports:
      - "${SONAR_PORT:-9000}:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s

  sonarqube-scan:
    image: sonarsource/sonar-scanner-cli:latest
    restart: "no"
    profiles: ["sonar"]
    depends_on:
      sonarqube:
        condition: service_healthy
    environment:
      SONAR_HOST_URL: ${SONAR_HOST_URL:-http://sonarqube:9000}
      SONAR_PROJECT_KEY: ${SONAR_PROJECT_KEY:-achingono_money}
      SONAR_TOKEN: ${SONAR_TOKEN:-}
    volumes:
      - ./:/usr/src
    working_dir: /usr/src
    entrypoint: ["/bin/sh", "-lc"]
    command: >
      "if [ -z \"${SONAR_TOKEN}\" ]; then echo 'SONAR_TOKEN is required for sonarqube-scan container' >&2; exit 1; fi;
      sonar-scanner
      -Dsonar.projectKey=${SONAR_PROJECT_KEY}
      -Dsonar.host.url=${SONAR_HOST_URL}
      -Dsonar.token=${SONAR_TOKEN}
      -Dsonar.qualitygate.wait=true"

volumes:
  pgdata:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
